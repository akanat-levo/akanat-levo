# Save this in your PROFILE repo at:  .github/workflows/snake.yml
name: Generate Snake Animation

on:
  schedule:
    - cron: "0 */12 * * *"   # every 12 hours
  workflow_dispatch:          # lets you run it manually
  push:
    branches:
      - main

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Generate snake SVGs
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/snake-light.svg?palette=github-light&color_snake=#5b9bd5&color_dots=#ebedf0,#b3d1f0,#5b9bd5,#3a6ea5,#274f78
            dist/snake-dark.svg?palette=github-dark&color_snake=#8b5cf6&color_dots=#161b22,#2d3f5e,#3a6ea5,#5b9bd5,#8b5cf6

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
